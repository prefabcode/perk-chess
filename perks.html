<dialog id="hue-chess-perks-modal">
    <div class="close-button-anchor">
      <button id="close-perks-modal" class="close-button" data-icon="" aria-label="Close"></button>
    </div>
    <div class="scrollable">
      <div class="dialog-content">
        <h2 id="perks-header">Perk Selection (O/2)</h2>
  
        <div class="progress-info">
          Level: <span id="current-level"></span> | XP Points: <span id="hue-points"></span>
          
        </div>
        
        <div>
          Unlock Order: 
          <select id="unlock-order-dropdown">
            <option value="0">Classic</option>
            <option value="1" disabled>Aggressive</option>
            <option value="2" disabled>Balanced</option>
            <option value="3" disabled>Gladiator</option>
            <option value="4" disabled>Berserker</option>
          </select>
        </div>

        <div id="perks-container" class="perks">

        </div>

         <div class="flash flash-quiet">
          <p id="tips-message" class="text" data-icon=""></p>
        </div>
      </div>
    </div>
  </dialog>
