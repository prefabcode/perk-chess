<dialog id="hue-chess-perks-modal" class="hue-modal">
    <div class="close-button-anchor">
      <button id="close-perks-modal" class="close-button" data-icon="" aria-label="Close"></button>
    </div>
    <div class="scrollable">
      <div class="dialog-content">
        <div id="prestige-emblem" style="display: none;">
          <img id="prestige-emblem-img" alt="Prestige emblem" />
          <span id="prestige-emblem-label"></span>
        </div>

        <h2 id="perks-header">Perk Selection</h2>

        <div id="perk-progress-info">
          Level: <span id="current-level"></span> | XP Points: <span id="hue-points"></span>
        </div>

        <div id="specialization-container">
          Specialization: 
          <select id="unlock-order-dropdown">
            <option value="0">Strategist</option>
            <option value="1">Gladiator</option>
            <option value="2">Gambiteer</option>
            <option value="3">Chaos Agent</option>
            <option value="4">Berserker</option>
            <option value="5">Experimentalist</option>
            <option value="6">Randomizer</option>
          </select>
          <button id="reroll-perks-btn" type="button" title="Reroll perk order" style="display: none;">🎲</button>
        </div>
  
        <div id="perks-container" class="perks">

        </div>

         <div class="flash flash-quiet">
          <p id="tips-message" class="text" data-icon=""></p>
        </div>
      </div>
    </div>
  </dialog>
