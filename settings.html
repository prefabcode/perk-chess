<dialog id="hue-chess-settings-modal" class="hue-modal">
  <div class="close-button-anchor">
    <button id="close-settings-modal" class="close-button" data-icon="" aria-label="Close"></button>
  </div>
  <div class="scrollable">
    <div class="dialog-content">
      <h2>Perk Chess Settings</h2>
      
      <!-- Reset Progress Section -->
      <div class="section">
        <h3>Reset Progress</h3>
        <p>Clear all your current progress and restart from level 1. If you want to reset all settings (including prestige) please reinstall the Perk Chess extension.</p>
        <button id="reset-progress" class="styled-button">Reset to level 1</button>
      </div>

      <!-- Development Tools Section -->
      <div id="dev-tools" class="section" style="display: none;">
        <h3>Development Tools</h3>
        <button id="export-state" class="styled-button">Export State</button>
        <button id="import-state" class="styled-button">Import State</button>
      </div>
    </div>
  </div>
</dialog>
